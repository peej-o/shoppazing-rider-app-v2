name: shoppazing_rider_v2
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  
  # UI Packages
  pin_code_fields: ^8.0.1
  intl: ^0.19.0
  
  # Authentication
  google_sign_in: ^6.2.1
  firebase_auth: ^5.1.1
  firebase_core: ^3.8.0
  
  # Networking
  http: ^1.4.0
  connectivity_plus: ^6.0.5
  
  # Utilities
  url_launcher: ^6.3.0
  geolocator: ^12.0.0
  
  # Maps - Add these two packages
  flutter_map: ^7.0.2  
  latlong2: ^0.9.1     
  
  # Local Storage
  sqflite: ^2.4.2
  path: ^1.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/shoppazing_logo.jpg